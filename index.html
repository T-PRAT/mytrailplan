<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <script>
      (function () {
        var t = localStorage.getItem('trailprep-theme');
        var dark = t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        document.documentElement.style.background = dark ? '#0e0e0e' : '#f5f2eb';
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTrailPlan — Planificateur de ravitaillement et analyse GPX pour le trail</title>
    <meta name="description" content="Planifie ton ravitaillement, analyse les pentes et simule ton allure sur ta trace GPX. Outil gratuit pour le trail running.">
    <link rel="canonical" href="https://mytrailplan.com/">
    <meta name="theme-color" content="#0e0e0e">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mytrailplan.com/">
    <meta property="og:title" content="MyTrailPlan — Planificateur de ravitaillement et analyse GPX pour le trail">
    <meta property="og:description" content="Planifie ton ravitaillement, analyse les pentes et simule ton allure sur ta trace GPX. Outil gratuit pour le trail running.">
    <meta property="og:image" content="https://mytrailplan.com/og-image.png">
    <meta property="og:locale" content="fr_FR">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MyTrailPlan — Planificateur de ravitaillement et analyse GPX pour le trail">
    <meta name="twitter:description" content="Planifie ton ravitaillement, analyse les pentes et simule ton allure sur ta trace GPX. Outil gratuit pour le trail running.">
    <meta name="twitter:image" content="https://mytrailplan.com/og-image.png">

    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MyTrailPlan",
      "url": "https://mytrailplan.com",
      "description": "Planifie ton ravitaillement, analyse les pentes et simule ton allure sur ta trace GPX. Outil gratuit pour le trail running.",

</html>
